name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-test:
    name: Android engine + personalization tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AstroSleep-Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests (ElementVector, AstrologicalEngine, TagEngine v4, fingerprint goldens)
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --stacktrace
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: AstroSleep-Android/app/build/reports/tests/

  manifest:
    name: Sound manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate schema, 12-dimension tag vocabulary, unique IDs
        run: python AstroSleep-iOS/Sounds/validate_manifest.py --compute-scores

  parity:
    name: Cross-platform parity guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: cosmic-systems copies · manifest copies · dimension weights · iOS config singletons
        run: python tools/check_parity.py
